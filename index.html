<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>密碼背誦小助手 / Password Memorizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ══════════════════════════════════════════
   Reset & Base
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: clamp(12px, 4vw, 32px) clamp(8px, 3vw, 16px) clamp(32px, 8vw, 64px);
  transition: background 0.2s, color 0.2s;
  line-height: 1.4;
}

/* ══════════════════════════════════════════
   Theme tokens
══════════════════════════════════════════ */
body {
  --bg:      #0a0a0a;
  --bg2:     #111111;
  --bg3:     #1a1a1a;
  --bg4:     #242424;
  --text:    #f0f0f0;
  --text2:   #a0a0a0;
  --text3:   #565656;
  --border:  #202020;
  --border2: #303030;
  --border3: #424242;
  --green:        #22c55e;
  --green-bg:     #0b2117;
  --green-border: #1c4d30;
  --red:          #ef4444;
  --red-bg:       #25100f;
  --red-border:   #5a1d1a;
  --mono: 'JetBrains Mono', 'SF Mono', 'Courier New', monospace;
  background: #050505;
  color: var(--text);
}
body.light {
  --bg:      #ffffff;
  --bg2:     #f7f7f7;
  --bg3:     #efefef;
  --bg4:     #e6e6e6;
  --text:    #0a0a0a;
  --text2:   #4d4d4d;
  --text3:   #a3a3a3;
  --border:  #e2e2e2;
  --border2: #d0d0d0;
  --border3: #b8b8b8;
  --green:        #16a34a;
  --green-bg:     #eefcf2;
  --green-border: #bbe9cb;
  --red:          #dc2626;
  --red-bg:       #fdeeed;
  --red-border:   #f3c6c3;
  background: #efefef;
  color: var(--text);
}
* { transition: background-color 0.2s, border-color 0.2s, color 0.2s; }
input, .progress-fill, .cdot { transition: background-color 0.12s, border-color 0.12s; }

/* ══════════════════════════════════════════
   App shell — fluid width across breakpoints
══════════════════════════════════════════ */
#app {
  width: 100%;
  max-width: 520px;
  background: var(--bg);
  border: 0.5px solid var(--border2);
  border-radius: clamp(10px, 2vw, 16px);
  overflow: hidden;
}

/* ══════════════════════════════════════════
   Top bar
══════════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: clamp(10px, 2vw, 14px) clamp(14px, 3vw, 20px);
  border-bottom: 0.5px solid var(--border);
  background: var(--bg2);
  gap: 8px;
}
.logo {
  font-family: var(--mono);
  font-size: clamp(12px, 2.5vw, 13px);
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.03em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.logo .dim { color: var(--text3); }
.topbar-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

.pill-btn {
  background: transparent;
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  letter-spacing: 0.03em;
  font-family: inherit;
  line-height: 1.3;
  min-height: 26px;
}
.pill-btn:hover { border-color: var(--border3); color: var(--text); }
.pill-btn:active { transform: scale(0.96); }
.pill-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.pill-btn:focus-visible { outline: 2px solid var(--text2); outline-offset: 2px; }

/* ══════════════════════════════════════════
   Sections
══════════════════════════════════════════ */
.section {
  padding: clamp(14px, 3vw, 20px);
  border-bottom: 0.5px solid var(--border);
}
.section:last-child { border-bottom: none; }
.section-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* ══════════════════════════════════════════
   Password input row
══════════════════════════════════════════ */
.pw-row { display: flex; gap: 8px; align-items: stretch; }

.pw-field {
  flex: 1;
  min-width: 0;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: var(--mono);
  font-size: clamp(14px, 3vw, 15px);
  color: var(--text);
  outline: none;
  letter-spacing: 0.1em;
  width: 100%;
}
.pw-field::placeholder { color: var(--text3); letter-spacing: 0.01em; font-size: 13px; font-family: 'Inter', sans-serif; }
.pw-field:focus { border-color: var(--border3); }
.pw-field:focus-visible { outline: 2px solid var(--text2); outline-offset: 1px; }

.icon-btn {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  width: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text3);
  flex-shrink: 0;
  font-size: 17px;
}
.icon-btn:hover { border-color: var(--border3); color: var(--text2); }
.icon-btn:active { transform: scale(0.95); }
.icon-btn:focus-visible { outline: 2px solid var(--text2); outline-offset: 1px; }

/* ══════════════════════════════════════════
   Mode cards
══════════════════════════════════════════ */
.mode-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: clamp(6px, 1.5vw, 8px);
  margin-top: 12px;
}
.mode-card {
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: clamp(8px, 2vw, 12px) clamp(4px, 1.5vw, 10px);
  text-align: center;
  cursor: pointer;
  min-width: 0;
}
.mode-card:hover { border-color: var(--border2); }
.mode-card:active { transform: scale(0.98); }
.mode-card.active {
  background: var(--bg3);
  border-color: var(--text2);
  box-shadow: 0 0 0 1px var(--text2) inset;
}
.mode-card:focus-visible { outline: 2px solid var(--text2); outline-offset: 2px; }
.mode-icon { font-size: 18px; color: var(--text3); margin-bottom: 5px; display: block; }
.mode-card.active .mode-icon { color: var(--text2); }
.mode-name {
  font-size: clamp(11px, 2.5vw, 12px);
  font-weight: 500;
  color: var(--text2);
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mode-card.active .mode-name { color: var(--text); }
.mode-sub {
  font-size: 9.5px;
  color: var(--text3);
  display: block;
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ══════════════════════════════════════════
   Penalty toggle
══════════════════════════════════════════ */
.opt-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 0.5px solid var(--border);
}
.toggle-wrap {
  width: 36px;
  height: 20px;
  background: var(--bg4);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}
.toggle-wrap.on { background: var(--text); border-color: var(--text); }
.toggle-knob {
  position: absolute;
  top: 2.5px;
  left: 2.5px;
  width: 13px;
  height: 13px;
  background: var(--text3);
  border-radius: 50%;
  transition: left 0.18s, background 0.18s;
}
.toggle-wrap.on .toggle-knob { left: 19.5px; background: var(--bg); }
.toggle-wrap:focus-visible { outline: 2px solid var(--text2); outline-offset: 2px; }
.opt-label { font-size: clamp(11px, 2.5vw, 12px); color: var(--text3); }

/* ══════════════════════════════════════════
   Hint box
══════════════════════════════════════════ */
.hint-box {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: clamp(14px, 4vw, 20px) clamp(10px, 3vw, 16px);
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: auto;
}
.hint-chars {
  font-family: var(--mono);
  font-size: clamp(15px, 4.2vw, 20px);
  font-weight: 500;
  letter-spacing: 0.18em;
  line-height: 1.7;
  text-align: center;
  word-break: break-all;
  white-space: pre-wrap;
}
.hint-chars .ch-show { color: var(--text); }
.hint-chars .ch-hide { color: var(--text3); }
.hint-empty { font-size: 12px; color: var(--text3); font-family: 'Inter', sans-serif; letter-spacing: 0.01em; }

/* ══════════════════════════════════════════
   Progress
══════════════════════════════════════════ */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.progress-track { flex: 1; height: 2px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--text2); border-radius: 2px; width: 0%; transition: width 0.18s ease, background-color 0.15s; }
.progress-fill.done { background: var(--green); }
.progress-num { font-family: var(--mono); font-size: 11px; color: var(--text3); min-width: 48px; text-align: right; flex-shrink: 0; }

/* ══════════════════════════════════════════
   Main practice input
   NOTE: visual state classes never block or delay
   native input behaviour — they are purely cosmetic.
══════════════════════════════════════════ */
.main-input {
  width: 100%;
  background: var(--bg3);
  border: 1.5px solid var(--border2);
  border-radius: 10px;
  padding: clamp(12px, 3vw, 14px) clamp(12px, 3vw, 16px);
  font-family: var(--mono);
  font-size: clamp(16px, 4vw, 18px);
  font-weight: 500;
  color: var(--text);
  outline: none;
  letter-spacing: 0.14em;
  caret-color: var(--text2);
}
.main-input::placeholder { color: var(--text3); font-size: 13px; letter-spacing: 0.01em; font-weight: 400; font-family: 'Inter', sans-serif; }
.main-input:focus { border-color: var(--border3); }
.main-input:focus-visible { outline: none; }
.main-input.state-ok   { border-color: var(--green); background: var(--green-bg); }
.main-input.state-err  { border-color: var(--red);   background: var(--red-bg); animation: shake 0.28s ease; }
.main-input.state-done { border-color: var(--green); background: var(--green-bg); }
.main-input:disabled { opacity: 0.4; cursor: not-allowed; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(6px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}
@media (prefers-reduced-motion: reduce) {
  .main-input.state-err { animation: none; }
  * { transition-duration: 0.01ms !important; }
}

/* ══════════════════════════════════════════
   Char dots — wrap freely, never overflow
══════════════════════════════════════════ */
.dot-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
  min-height: 14px;
}
.cdot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--bg4);
  border: 0.5px solid var(--border2);
  flex-shrink: 0;
}
.cdot.ok   { background: var(--green); border-color: var(--green); }
.cdot.fail { background: var(--red);   border-color: var(--red); }
.cdot.cur  { background: var(--bg4); border-color: var(--text3); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--text3); }

/* ══════════════════════════════════════════
   Inline messages
══════════════════════════════════════════ */
.msg-row { min-height: 18px; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
.msg-err { font-family: var(--mono); font-size: 11px; color: var(--red); }
.msg-ok  { font-family: var(--mono); font-size: 11px; color: var(--green); }

/* ══════════════════════════════════════════
   Success banner
══════════════════════════════════════════ */
.success-banner {
  display: none;
  margin-top: 10px;
  background: var(--green-bg);
  border: 0.5px solid var(--green-border);
  border-radius: 10px;
  padding: 13px 16px;
  text-align: center;
}
.success-banner.show { display: block; }
.success-banner p { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--green); }
.success-banner small { display: block; font-size: 11px; color: var(--green); opacity: 0.7; margin-top: 4px; font-family: 'Inter', sans-serif; }

/* ══════════════════════════════════════════
   Stats grid — responsive 4→2 columns
══════════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(6px, 2vw, 8px);
  margin-bottom: 14px;
}
.stat-card { background: var(--bg3); border-radius: 8px; padding: clamp(8px, 2.5vw, 12px) 6px; text-align: center; min-width: 0; }
.stat-val { font-family: var(--mono); font-size: clamp(15px, 4vw, 20px); font-weight: 600; color: var(--text); line-height: 1; display: block; }
.stat-lbl { font-size: 9.5px; color: var(--text3); margin-top: 5px; display: block; letter-spacing: 0.03em; white-space: nowrap; }

/* ══════════════════════════════════════════
   Action buttons — wrap on narrow screens
══════════════════════════════════════════ */
.action-row { display: flex; gap: 8px; flex-wrap: wrap; }
.act-btn {
  flex: 1 1 calc(33.333% - 6px);
  min-width: 92px;
  background: transparent;
  border: 0.5px solid var(--border2);
  border-radius: 8px;
  padding: 10px 6px;
  font-size: clamp(11px, 2.8vw, 12px);
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.act-btn:hover { border-color: var(--border3); color: var(--text); }
.act-btn:active { transform: scale(0.98); }
.act-btn:focus-visible { outline: 2px solid var(--text2); outline-offset: 2px; }
.act-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.act-btn.primary:hover { opacity: 0.85; }
.act-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.act-btn:disabled:hover { border-color: var(--border2); color: var(--text2); opacity: 0.3; }

/* ══════════════════════════════════════════
   Footer
══════════════════════════════════════════ */
.footer-note {
  text-align: center;
  padding: 10px clamp(14px, 3vw, 20px) 4px;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.02em;
  border-top: 0.5px solid var(--border);
  line-height: 1.5;
}

/* ══════════════════════════════════════════
   Scrollbar
══════════════════════════════════════════ */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ══════════════════════════════════════════
   Breakpoints — real testing across device classes
   ≤360px (small phones), ≤480px (phones), 481-768 (tablets), >768 (desktop, default above)
══════════════════════════════════════════ */
@media (max-width: 480px) {
  body { padding: 10px 6px 40px; align-items: flex-start; }
  #app { border-radius: 12px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .act-btn { flex: 1 1 calc(50% - 4px); }
}
@media (max-width: 360px) {
  .logo { font-size: 11px; }
  .pill-btn { padding: 5px 9px; font-size: 10.5px; }
  .mode-sub { display: none; }
  .mode-card { padding: 10px 4px; }
  .hint-chars { letter-spacing: 0.12em; }
}
@media (min-width: 481px) and (max-width: 768px) {
  #app { max-width: 560px; }
}
@media (min-width: 769px) {
  #app { max-width: 540px; }
  body { padding-top: 48px; }
}
@media (hover: none) and (pointer: coarse) {
  /* touch devices: bigger tap targets */
  .icon-btn { width: 46px; }
  .pill-btn { padding: 7px 13px; min-height: 32px; }
  .mode-card { padding: 14px 8px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo"><span class="dim">// </span>密碼背誦<span class="dim"> _</span></div>
    <div class="topbar-right">
      <button class="pill-btn" id="langBtn" onclick="toggleLang()" type="button">EN</button>
      <button class="pill-btn" id="themeBtn" onclick="toggleTheme()" type="button">☀</button>
    </div>
  </div>

  <!-- Section 1: Setup -->
  <div class="section">
    <div class="section-label" id="lbl-setup">設定</div>

    <div class="pw-row">
      <input class="pw-field" type="password" id="pwInput"
        placeholder="輸入欲背誦的密碼..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        oninput="onPwChange()">
      <button class="icon-btn" id="eyeBtn" onclick="toggleEye()" type="button" title="顯示/隱藏密碼" aria-label="顯示密碼">
        <i class="ti ti-eye" id="eyeIcon" aria-hidden="true"></i>
      </button>
    </div>

    <div class="mode-grid">
      <div class="mode-card active" id="mode-full" onclick="setMode('full')" role="button" tabindex="0">
        <i class="ti ti-eye mode-icon" aria-hidden="true"></i>
        <span class="mode-name" id="m1n">全顯</span>
        <span class="mode-sub"  id="m1s">完整顯示</span>
      </div>
      <div class="mode-card" id="mode-first" onclick="setMode('first')" role="button" tabindex="0">
        <i class="ti ti-asterisk mode-icon" aria-hidden="true"></i>
        <span class="mode-name" id="m2n">字首</span>
        <span class="mode-sub"  id="m2s">首字提示</span>
      </div>
      <div class="mode-card" id="mode-blind" onclick="setMode('blind')" role="button" tabindex="0">
        <i class="ti ti-eye-off mode-icon" aria-hidden="true"></i>
        <span class="mode-name" id="m3n">全盲</span>
        <span class="mode-sub"  id="m3s">完全遮蔽</span>
      </div>
    </div>

    <div class="opt-row">
      <div class="toggle-wrap on" id="penaltyToggle" onclick="togglePenalty()" role="switch" tabindex="0" aria-checked="true">
        <div class="toggle-knob"></div>
      </div>
      <span class="opt-label" id="penaltyLabel">卡住模式：打錯立即清除</span>
    </div>
  </div>

  <!-- Section 2: Hint -->
  <div class="section">
    <div class="section-label" id="lbl-hint">提示</div>
    <div class="hint-box">
      <div class="hint-chars" id="hintChars" aria-live="polite">
        <span class="hint-empty" id="hintEmpty">請先輸入密碼</span>
      </div>
    </div>
  </div>

  <!-- Section 3: Practice -->
  <div class="section">
    <div class="section-label" id="lbl-practice">練習</div>

    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-num" id="progressNum">0 / 0</span>
    </div>

    <input class="main-input" type="password" id="mainInput"
      placeholder="在此輸入密碼..."
      autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false"
      oninput="onPracticeInput()" onpaste="return false"
      aria-label="練習輸入區" disabled>

    <div class="dot-row" id="dotRow" aria-hidden="true"></div>

    <div class="msg-row">
      <span class="msg-err" id="msgErr"></span>
      <span class="msg-ok"  id="msgOk"></span>
    </div>

    <div class="success-banner" id="successBanner" role="status">
      <p id="successMsg">✓ 完全正確！</p>
      <small id="successSub">繼續挑戰下一模式</small>
    </div>
  </div>

  <!-- Section 4: Stats -->
  <div class="section">
    <div class="section-label" id="lbl-stats">統計</div>

    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-val" id="statAcc">—</span>
        <span class="stat-lbl" id="sl-acc">正確率</span>
      </div>
      <div class="stat-card">
        <span class="stat-val" id="statStreak">0</span>
        <span class="stat-lbl" id="sl-streak">連勝</span>
      </div>
      <div class="stat-card">
        <span class="stat-val" id="statAttempts">0</span>
        <span class="stat-lbl" id="sl-attempts">嘗試</span>
      </div>
      <div class="stat-card">
        <span class="stat-val" id="statBest">—</span>
        <span class="stat-lbl" id="sl-best">最佳長度</span>
      </div>
    </div>

    <div class="action-row">
      <button class="act-btn" id="resetBtn"    onclick="resetPractice()" type="button">重新開始</button>
      <button class="act-btn" id="changePwBtn" onclick="changePw()" type="button">換密碼</button>
      <button class="act-btn primary" id="nextModeBtn" onclick="nextMode()" type="button" disabled>下一模式</button>
    </div>
  </div>

  <div class="footer-note" id="footerNote">所有資料僅存在於記憶體，重新整理即清除 · No data leaves your browser</div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   i18n strings
══════════════════════════════════════════ */
const STRINGS = {
  zh: {
    lblSetup: '設定', lblHint: '提示', lblPractice: '練習', lblStats: '統計',
    m1n: '全顯',  m1s: '完整顯示',
    m2n: '字首',  m2s: '首字提示',
    m3n: '全盲',  m3s: '完全遮蔽',
    pwPh: '輸入欲背誦的密碼...',
    pracPh: '在此輸入密碼...',
    hintEmpty: '請先輸入密碼',
    penaltyLabel: '卡住模式：打錯立即清除',
    slAcc: '正確率', slStreak: '連勝', slAttempts: '嘗試', slBest: '最佳長度',
    resetBtn: '重新開始', changePwBtn: '換密碼', nextModeBtn: '下一模式',
    successMsg: '✓ 完全正確！',
    successSub: '繼續挑戰下一模式',
    msgErr: '✗ 錯誤，已重置',
    langBtn: 'EN', themeBtn: { dark: '☀', light: '☾' },
    footerNote: '所有資料僅存在於記憶體，重新整理即清除 · No data leaves your browser',
    eyeShow: '顯示密碼', eyeHide: '隱藏密碼',
  },
  en: {
    lblSetup: 'Setup', lblHint: 'Hint', lblPractice: 'Practice', lblStats: 'Stats',
    m1n: 'Full',  m1s: 'Show all',
    m2n: 'First', m2s: 'First char',
    m3n: 'Blind', m3s: 'All hidden',
    pwPh: 'Enter the password to memorize...',
    pracPh: 'Type the password here...',
    hintEmpty: 'Enter a password above',
    penaltyLabel: 'Lock mode: clear instantly on error',
    slAcc: 'Accuracy', slStreak: 'Streak', slAttempts: 'Attempts', slBest: 'Best len',
    resetBtn: 'Restart', changePwBtn: 'New PW', nextModeBtn: 'Next mode',
    successMsg: '✓ Correct!',
    successSub: 'Try the next mode',
    msgErr: '✗ Wrong — reset',
    langBtn: '中', themeBtn: { dark: '☀', light: '☾' },
    footerNote: 'All data stays in memory only · Refresh to clear · No data leaves your browser',
    eyeShow: 'Show password', eyeHide: 'Hide password',
  },
};

/* ══════════════════════════════════════════
   State
══════════════════════════════════════════ */
let lang      = 'zh';
let theme     = 'dark';
let mode      = 'full';
let penaltyOn = true;

let password  = '';

let streak        = 0;
let attempts       = 0;
let totalTyped     = 0;
let totalCorrect   = 0;
let bestLen        = 0;

const $ = id => document.getElementById(id);

/* ══════════════════════════════════════════
   Theme
══════════════════════════════════════════ */
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.body.classList.toggle('light', theme === 'light');
  $('themeBtn').textContent = STRINGS[lang].themeBtn[theme];
}

/* ══════════════════════════════════════════
   Language
══════════════════════════════════════════ */
function toggleLang() {
  lang = lang === 'zh' ? 'en' : 'zh';
  applyStrings();
  renderHint();
}

function applyStrings() {
  const s = STRINGS[lang];
  $('lbl-setup').textContent    = s.lblSetup;
  $('lbl-hint').textContent     = s.lblHint;
  $('lbl-practice').textContent = s.lblPractice;
  $('lbl-stats').textContent    = s.lblStats;
  $('m1n').textContent = s.m1n; $('m1s').textContent = s.m1s;
  $('m2n').textContent = s.m2n; $('m2s').textContent = s.m2s;
  $('m3n').textContent = s.m3n; $('m3s').textContent = s.m3s;
  $('pwInput').placeholder      = s.pwPh;
  $('mainInput').placeholder    = s.pracPh;
  $('penaltyLabel').textContent = s.penaltyLabel;
  $('sl-acc').textContent       = s.slAcc;
  $('sl-streak').textContent    = s.slStreak;
  $('sl-attempts').textContent  = s.slAttempts;
  $('sl-best').textContent      = s.slBest;
  $('resetBtn').textContent     = s.resetBtn;
  $('changePwBtn').textContent  = s.changePwBtn;
  $('nextModeBtn').textContent  = s.nextModeBtn;
  $('langBtn').textContent      = s.langBtn;
  $('themeBtn').textContent     = s.themeBtn[theme];
  $('footerNote').textContent   = s.footerNote;
  if ($('successBanner').classList.contains('show')) {
    $('successMsg').textContent = s.successMsg;
    $('successSub').textContent = s.successSub;
  }
  const he = $('hintEmpty');
  if (he) he.textContent = s.hintEmpty;
  const eyeIsShowing = $('pwInput').type === 'text';
  $('eyeBtn').setAttribute('aria-label', eyeIsShowing ? s.eyeHide : s.eyeShow);
}

/* ══════════════════════════════════════════
   Eye toggle
══════════════════════════════════════════ */
function toggleEye() {
  const inp = $('pwInput');
  const showing = inp.type === 'text';
  inp.type = showing ? 'password' : 'text';
  $('eyeIcon').className = showing ? 'ti ti-eye' : 'ti ti-eye-off';
  $('eyeBtn').setAttribute('aria-label', STRINGS[lang][showing ? 'eyeShow' : 'eyeHide']);
}

/* ══════════════════════════════════════════
   Mode selection
══════════════════════════════════════════ */
function setMode(m) {
  mode = m;
  ['full', 'first', 'blind'].forEach(x =>
    $('mode-' + x).classList.toggle('active', x === m)
  );
  renderHint();
  resetPractice();
}

function nextMode() {
  const order = ['full', 'first', 'blind'];
  const next  = order[(order.indexOf(mode) + 1) % order.length];
  setMode(next);
}

/* ══════════════════════════════════════════
   Penalty toggle
══════════════════════════════════════════ */
function togglePenalty() {
  penaltyOn = !penaltyOn;
  const t = $('penaltyToggle');
  t.classList.toggle('on', penaltyOn);
  t.setAttribute('aria-checked', String(penaltyOn));
}

/* ══════════════════════════════════════════
   Password setup input
══════════════════════════════════════════ */
function onPwChange() {
  password = $('pwInput').value;
  renderHint();
  resetPractice();
  $('mainInput').disabled = (password.length === 0);
}

/* ══════════════════════════════════════════
   Hint rendering
══════════════════════════════════════════ */
function renderHint() {
  const container = $('hintChars');
  if (!password) {
    container.innerHTML = `<span class="hint-empty" id="hintEmpty">${STRINGS[lang].hintEmpty}</span>`;
    return;
  }
  let html = '';
  for (let i = 0; i < password.length; i++) {
    const ch  = escHtml(password[i]);
    const show = (mode === 'full') || (mode === 'first' && i === 0);
    html += show
      ? `<span class="ch-show">${ch}</span>`
      : `<span class="ch-hide">*</span>`;
  }
  container.innerHTML = html;
}

function escHtml(c) {
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ══════════════════════════════════════════
   Dot row
══════════════════════════════════════════ */
function buildDots() {
  let html = '';
  for (let i = 0; i < password.length; i++) {
    html += `<div class="cdot" id="dot-${i}"></div>`;
  }
  $('dotRow').innerHTML = html;
}

function paintDots(correctLen, totalTypedLen) {
  for (let i = 0; i < password.length; i++) {
    const d = $('dot-' + i);
    if (!d) continue;
    if (i < correctLen)            d.className = 'cdot ok';
    else if (i < totalTypedLen)    d.className = 'cdot fail';
    else if (i === correctLen)     d.className = 'cdot cur';
    else                            d.className = 'cdot';
  }
}

/* ══════════════════════════════════════════
   Reset practice session (does NOT touch stats)
══════════════════════════════════════════ */
function resetPractice() {
  const input = $('mainInput');
  input.value = '';
  setInputState('');
  $('successBanner').classList.remove('show');
  $('msgErr').textContent = '';
  $('msgOk').textContent  = '';
  $('progressFill').style.width = '0%';
  $('progressFill').classList.remove('done');
  $('progressNum').textContent  = '0 / ' + (password.length || 0);
  $('nextModeBtn').disabled = true;
  buildDots();
  if (password.length > 0) paintDots(0, 0);
  if (password) input.focus();
}

function setInputState(s) {
  $('mainInput').className = 'main-input' + (s ? ' state-' + s : '');
}

/* ══════════════════════════════════════════
   Core practice input handler
   — fully synchronous, no setTimeout, no value
     mutation mid-keystroke. The input element's
     native value is the single source of truth;
     we only ever READ it and react, never rewrite
     it while the user might still be typing.
══════════════════════════════════════════ */
function onPracticeInput() {
  if (!password) return;

  const input = $('mainInput');
  const val   = input.value;
  const len   = val.length;

  // How many leading characters match the password exactly.
  let correctLen = 0;
  while (correctLen < len && correctLen < password.length && val[correctLen] === password[correctLen]) {
    correctLen++;
  }

  const isWrong = (correctLen < len); // a mismatched or extra character exists

  paintDots(correctLen, len);

  const pct = password.length > 0 ? Math.round((correctLen / password.length) * 100) : 0;
  $('progressFill').style.width = pct + '%';
  $('progressNum').textContent  = correctLen + ' / ' + password.length;

  if (isWrong) {
    setInputState('err');
    $('msgErr').textContent = STRINGS[lang].msgErr;
    $('msgOk').textContent  = '';

    totalTyped++;
    // no totalCorrect increment — this keystroke was wrong

    if (penaltyOn) {
      // Reset immediately and synchronously — no delay, no race condition.
      input.value = '';
      setInputState('');
      paintDots(0, 0);
      $('progressFill').style.width = '0%';
      $('progressNum').textContent = '0 / ' + password.length;
    }
    updateStats();
    return;
  }

  // Correct so far
  $('msgErr').textContent = '';
  if (len > 0) {
    totalTyped++;
    totalCorrect++;
  }

  if (len === 0) {
    setInputState('');
  } else if (len === password.length && correctLen === password.length) {
    onComplete();
    return;
  } else {
    setInputState('ok');
  }

  updateStats();
}

/* ══════════════════════════════════════════
   Completion
══════════════════════════════════════════ */
function onComplete() {
  attempts++;
  streak++;
  if (password.length > bestLen) bestLen = password.length;

  setInputState('done');
  $('progressFill').style.width = '100%';
  $('progressFill').classList.add('done');
  $('progressNum').textContent  = password.length + ' / ' + password.length;
  paintDots(password.length, password.length);

  $('successMsg').textContent = STRINGS[lang].successMsg;
  $('successSub').textContent = STRINGS[lang].successSub;
  $('successBanner').classList.add('show');
  $('msgErr').textContent = '';
  $('msgOk').textContent  = '';
  $('nextModeBtn').disabled = false;

  updateStats();
}

/* ══════════════════════════════════════════
   Stats
══════════════════════════════════════════ */
function updateStats() {
  const acc = totalTyped > 0 ? Math.round((totalCorrect / totalTyped) * 100) : null;
  $('statAcc').textContent      = acc !== null ? acc + '%' : '—';
  $('statStreak').textContent   = streak > 0 ? '🔥 ' + streak : '0';
  $('statAttempts').textContent = attempts;
  $('statBest').textContent     = bestLen > 0 ? bestLen : '—';
}

/* ══════════════════════════════════════════
   Change password — full state reset
══════════════════════════════════════════ */
function changePw() {
  password = '';
  $('pwInput').value = '';
  $('pwInput').type  = 'password';
  $('eyeIcon').className = 'ti ti-eye';
  $('mainInput').disabled = true;
  streak = 0; attempts = 0; totalTyped = 0; totalCorrect = 0; bestLen = 0;
  renderHint();
  resetPractice();
  updateStats();
  $('pwInput').focus();
}

/* ══════════════════════════════════════════
   Keyboard accessibility for custom controls
══════════════════════════════════════════ */
document.querySelectorAll('.mode-card').forEach(card => {
  card.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
  });
});
$('penaltyToggle').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePenalty(); }
});

/* ══════════════════════════════════════════
   Init
══════════════════════════════════════════ */
applyStrings();
renderHint();
updateStats();
$('progressNum').textContent = '0 / 0';
</script>
</body>
</html>
